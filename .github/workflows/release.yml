name: Create Release

on:
  push:
    branches: [main]

concurrency:
  group: create-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # Read version from package.json (source of truth)
          VERSION="$(node -p "require('./package.json').version")"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CalVer from package.json: $VERSION"

      - name: Check if release already exists
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG does not exist, will create."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync package.json version
        if: steps.check.outputs.exists == 'false'
        id: sync
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          if [ "$PKG_VERSION" = "$VERSION" ]; then
            echo "package.json already at $VERSION"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Updated package.json version from $PKG_VERSION to $VERSION"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If package.json was bumped, commit the change
          if [ "${{ steps.sync.outputs.bumped }}" = "true" ]; then
            git add package.json
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          fi

          SHA="$(git rev-parse HEAD)"
          git tag "$TAG" "$SHA"

          # Push tag + branch in one operation so the triggered npm-release
          # workflow sees the version-bumped commit
          git push origin HEAD:main "$TAG"

          gh release create "$TAG" \
            --target "$SHA" \
            --title "Tigerpaw $TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
